# Binary release workflow for gpuemu
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: gpuemu-linux-x86_64.tar.gz
          # Linux x86_64 musl (static binary)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: gpuemu-linux-x86_64-musl.tar.gz
          # Linux ARM64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: gpuemu-linux-aarch64.tar.gz
          # macOS x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: gpuemu-darwin-x86_64.tar.gz
          # macOS ARM64 (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: gpuemu-darwin-aarch64.tar.gz
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: gpuemu-windows-x86_64.zip

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-action@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install cross-compilation tools (Linux ARM)
      if: matrix.target == 'aarch64-unknown-linux-gnu'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu

    - name: Install musl tools
      if: matrix.target == 'x86_64-unknown-linux-musl'
      run: |
        sudo apt-get update
        sudo apt-get install -y musl-tools

    - name: Build
      run: cargo build --release --target ${{ matrix.target }}
      env:
        CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

    - name: Package (Unix)
      if: runner.os != 'Windows'
      run: |
        mkdir -p dist
        cp target/${{ matrix.target }}/release/gpuemu dist/
        cp target/${{ matrix.target }}/release/gpuemu-daemon dist/
        chmod +x dist/gpuemu dist/gpuemu-daemon
        cd dist && tar -czvf ../${{ matrix.artifact }} *

    - name: Package (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path dist
        Copy-Item target/${{ matrix.target }}/release/gpuemu.exe dist/
        Copy-Item target/${{ matrix.target }}/release/gpuemu-daemon.exe dist/
        Compress-Archive -Path dist/* -DestinationPath ${{ matrix.artifact }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact }}
        path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Get version
      id: version
      run: |
        if [ -n "${{ github.event.inputs.tag }}" ]; then
          echo "version=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
        else
          echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        fi

    - name: Create checksums
      run: |
        cd artifacts
        for dir in */; do
          mv "$dir"* .
          rm -rf "$dir"
        done
        sha256sum * > SHA256SUMS.txt

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.version }}
        name: gpuemu ${{ steps.version.outputs.version }}
        draft: false
        prerelease: ${{ contains(steps.version.outputs.version, '-') }}
        files: |
          artifacts/*
        body: |
          ## Installation

          ### Quick Install (Linux/macOS)
          ```bash
          curl -fsSL https://gpuemu.dev/install.sh | sh
          ```

          ### Manual Install
          1. Download the appropriate archive for your platform
          2. Extract: `tar -xzf gpuemu-*.tar.gz` (Unix) or unzip (Windows)
          3. Add to PATH or move to `/usr/local/bin`

          ### Verify
          ```bash
          gpuemu --version
          ```

          ## Changelog
          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)
