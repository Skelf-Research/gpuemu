# CI workflow for gpuemu
name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-action@stable
      with:
        components: clippy, rustfmt

    - name: Format check
      run: cargo fmt --all -- --check

    - name: Clippy
      run: cargo clippy --all-targets --all-features -- -D warnings

    - name: Check
      run: cargo check --all-targets

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-action@stable

    - name: Test
      run: cargo test --all

  python:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python deps
      run: |
        pip install pytest numpy
        pip install -e ./gpuemu-py[dev] || pip install -e ./gpuemu-py

    - name: Run Python tests
      run: pytest gpuemu-py/tests/ -v --ignore=gpuemu-py/tests/test_pytorch.py --ignore=gpuemu-py/tests/test_jax.py --ignore=gpuemu-py/tests/test_tensorflow.py
